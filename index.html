<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM — Forge Heatmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --border: #222228;
    --border2: #2a2a32;
    --text: #e8e8f0;
    --muted: #555566;
    --dim: #333340;

    --heat-0: #111113;
    --heat-1: #0f2318;
    --heat-2: #0e3d1f;
    --heat-3: #0d5c26;
    --heat-4: #0b7d2d;
    --heat-5: #09a034;
    --heat-6: #07c63b;
    --heat-7: #05ee42;

    --fail: #3d0f0f;
    --fail-border: #7d1a1a;
    --fail-text: #ff4444;

    --accent: #05ee42;
    --accent-dim: #07c63b;
    --accent-glow: rgba(5, 238, 66, 0.15);

    --warn: #f0a500;
    --warn-dim: #c47e00;

    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .shell {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 3rem;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .logo-block { display: flex; flex-direction: column; gap: 0.25rem; }

  .logo {
    font-family: var(--display);
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(5,238,66,0.06);
    animation: pulse-glow 4s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { text-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(5,238,66,0.06); }
    50% { text-shadow: 0 0 60px rgba(5,238,66,0.3), 0 0 100px rgba(5,238,66,0.12); }
  }

  .logo-sub {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .profile-section {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-right: auto;
  }

  .profile-img {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .profile-info {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
  }

  .profile-name {
    font-family: var(--display);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--text);
  }

  .profile-username {
    font-size: 0.75rem;
    color: var(--muted);
  }

  .profile-username a {
    color: var(--accent);
    text-decoration: none;
  }

  .profile-username a:hover {
    text-decoration: underline;
  }

  .header-stats {
    display: flex;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .hstat {
    background: var(--surface);
    padding: 0.75rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    min-width: 110px;
  }

  .hstat-val {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    font-family: var(--display);
    line-height: 1;
  }

  .hstat-val.warn { color: var(--warn); }
  .hstat-val.danger { color: var(--fail-text); }

  .hstat-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .ctrl-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .year-tabs {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .year-tab {
    background: var(--surface);
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .year-tab:hover { background: var(--surface2); color: var(--text); }
  .year-tab.active { background: var(--surface2); color: var(--accent); }

  .view-toggle {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-left: auto;
  }

  .vtog {
    background: var(--surface);
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .vtog:hover { background: var(--surface2); color: var(--text); }
  .vtog.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); }

  .heatmap-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .heatmap-section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    opacity: 0.4;
  }

  .section-title {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .month-labels {
    position: relative;
    height: 14px;
    margin-bottom: 0.4rem;
    padding-left: 28px;
    overflow: hidden;
  }

  .month-label-item {
    position: absolute;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transform: translateX(-2px);
    white-space: nowrap;
  }

  .heatmap-grid-wrap {
    display: flex;
    gap: 0;
  }

  .day-labels {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding-top: 2px;
    margin-right: 6px;
  }

  .day-label {
    font-size: 0.55rem;
    color: var(--muted);
    height: 11px;
    line-height: 11px;
    letter-spacing: 0.05em;
    width: 22px;
    text-align: right;
  }

  .heatmap-grid {
    display: flex;
    gap: 2px;
    flex: 1;
    overflow-x: auto;
    padding-bottom: 0.5rem;
  }

  .heatmap-grid::-webkit-scrollbar { height: 3px; }
  .heatmap-grid::-webkit-scrollbar-track { background: var(--surface); }
  .heatmap-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .week-col {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
    width: 13px;
  }

  .day-cell {
    width: 11px;
    height: 11px;
    border-radius: 2px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    border: 1px solid transparent;
  }

  .day-cell:hover {
    transform: scale(1.6);
    z-index: 10;
    border-color: rgba(255,255,255,0.2);
  }

  .day-cell.score-0  { background: var(--heat-0); }
  .day-cell.score-1  { background: var(--heat-1); }
  .day-cell.score-2  { background: var(--heat-2); }
  .day-cell.score-3  { background: var(--heat-3); }
  .day-cell.score-4  { background: var(--heat-4); }
  .day-cell.score-5  { background: var(--heat-5); }
  .day-cell.score-6  { background: var(--heat-6); }
  .day-cell.score-7  { background: var(--heat-7); box-shadow: 0 0 6px rgba(5,238,66,0.4); }
  .day-cell.fail     { background: var(--fail); border-color: var(--fail-border); }
  .day-cell.future   { background: transparent; border: 1px solid var(--border); cursor: default; }
  .day-cell.future:hover { transform: none; }
  .day-cell.today    { border: 1px solid var(--accent) !important; box-shadow: 0 0 8px var(--accent-glow); }

  .legend {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1rem;
    justify-content: flex-end;
  }

  .legend-label { font-size: 0.6rem; color: var(--muted); }

  .legend-cells {
    display: flex;
    gap: 2px;
  }

  .legend-cell {
    width: 11px;
    height: 11px;
    border-radius: 2px;
  }

  #tooltip {
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    font-size: 0.7rem;
    color: var(--text);
    pointer-events: none;
    z-index: 1000;
    display: none;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  #tooltip .tt-date { color: var(--muted); font-size: 0.6rem; margin-bottom: 0.3rem; letter-spacing: 0.1em; }
  #tooltip .tt-score { font-size: 1.1rem; font-weight: 700; color: var(--accent); font-family: var(--display); }
  #tooltip .tt-score.fail { color: var(--fail-text); }
  #tooltip .tt-score.warn { color: var(--warn); }
  #tooltip .tt-label { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.4rem; }
  #tooltip .tt-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 0.5rem; overflow: hidden; }
  #tooltip .tt-bar-fill { height: 100%; border-radius: 2px; transition: width 0.2s; }
  #tooltip .tt-tasks { font-size: 0.6rem; color: var(--dim); margin-top: 0.4rem; }

  .weekly-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }

  .week-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.85rem 1rem;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .week-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .week-card:hover { border-color: var(--border2); background: var(--surface); }
  .week-card:hover::after { transform: scaleX(var(--fill)); }
  .week-card.active-week { border-color: var(--accent); }

  .wc-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .wc-week {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .wc-pct {
    font-size: 1rem;
    font-weight: 700;
    font-family: var(--display);
  }

  .wc-bar-bg {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }

  .wc-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s cubic-bezier(0.16,1,0.3,1);
  }

  .wc-days {
    display: flex;
    gap: 2px;
    margin-top: 0.4rem;
  }

  .wc-day-pip {
    flex: 1;
    height: 4px;
    border-radius: 2px;
  }

  .wc-label {
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  .streak-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .streak-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.85rem 1.25rem;
    flex: 1;
    min-width: 140px;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .sc-val {
    font-size: 1.8rem;
    font-weight: 800;
    font-family: var(--display);
    color: var(--accent);
    line-height: 1;
  }

  .sc-val.warn { color: var(--warn); }
  .sc-val.muted { color: var(--muted); }

  .sc-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .log-title {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .log-filter {
    display: flex;
    gap: 4px;
  }

  .lf-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 0.2rem 0.6rem;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.12s;
  }

  .lf-btn:hover { border-color: var(--border2); color: var(--text); }
  .lf-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  .log-body { max-height: 320px; overflow-y: auto; }
  .log-body::-webkit-scrollbar { width: 3px; }
  .log-body::-webkit-scrollbar-track { background: var(--surface); }
  .log-body::-webkit-scrollbar-thumb { background: var(--border2); }

  .log-row {
    display: grid;
    grid-template-columns: 100px 60px 1fr 80px;
    gap: 1rem;
    padding: 0.6rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.7rem;
    transition: background 0.1s;
    animation: fadein 0.3s ease;
  }

  @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  .log-row:hover { background: var(--surface2); }
  .log-row:last-child { border-bottom: none; }

  .lr-date { color: var(--muted); font-size: 0.65rem; }

  .lr-score {
    font-weight: 700;
    font-family: var(--display);
  }

  .lr-note { color: var(--text); opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .lr-badge {
    font-size: 0.55rem;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    white-space: nowrap;
    align-self: center;
  }

  .badge-perfect { background: rgba(5,238,66,0.12); color: var(--accent); border: 1px solid rgba(5,238,66,0.3); }
  .badge-good    { background: rgba(7,198,59,0.1); color: #07c63b; border: 1px solid rgba(7,198,59,0.25); }
  .badge-ok      { background: rgba(240,165,0,0.1); color: var(--warn); border: 1px solid rgba(240,165,0,0.25); }
  .badge-fail    { background: rgba(255,68,68,0.1); color: var(--fail-text); border: 1px solid rgba(255,68,68,0.25); }
  .badge-missed  { background: rgba(51,51,64,0.5); color: var(--muted); border: 1px solid var(--border); }

  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 160px 80px 1fr auto;
    gap: 8px;
    align-items: end;
  }

  .form-group { display: flex; flex-direction: column; gap: 0.35rem; }

  .form-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .form-input {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.5rem 0.75rem;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .form-input:focus { border-color: var(--accent); }

  .score-slider {
    -webkit-appearance: none;
    appearance: none;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    height: 36px;
    padding: 0 0.5rem;
    cursor: pointer;
    accent-color: var(--accent);
  }

  .add-btn {
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.15s;
    white-space: nowrap;
    height: 36px;
  }

  .add-btn:hover {
    background: rgba(5,238,66,0.25);
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .score-preview {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.25rem;
    text-align: center;
  }

  footer {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .footer-text {
    font-size: 0.6rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  .blink {
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .io-row {
    display: flex;
    gap: 6px;
  }

  .io-btn {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.6rem;
    padding: 0.3rem 0.75rem;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.12s;
  }

  .io-btn:hover { border-color: var(--accent); color: var(--accent); }

  .sync-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-left: auto;
    font-size: 0.6rem;
    color: var(--muted);
  }

  .sync-status {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }

  .sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }

  .sync-dot.error { background: var(--fail-text); }

  @media (max-width: 700px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .add-btn { grid-column: span 2; }
    .log-row { grid-template-columns: 90px 50px 1fr; }
    .lr-badge { display: none; }
    .header-stats { flex-wrap: wrap; }
  }
</style>
</head>
<body>
<div id="tooltip">
  <div class="tt-date" id="tt-date"></div>
  <div class="tt-score" id="tt-score"></div>
  <div class="tt-label" id="tt-label"></div>
  <div class="tt-bar"><div class="tt-bar-fill" id="tt-bar-fill"></div></div>
  <div class="tt-tasks" id="tt-tasks"></div>
</div>

<div class="shell">

  <header>
    <div class="profile-section">
      <img class="profile-img" src="https://github.com/keirsalterego.png" alt="Profile">
      <div class="profile-info">
        <span class="profile-name">M.</span>
        <span class="profile-username"><a href="https://github.com/keirsalterego" target="_blank">@keirsalterego</a></span>
      </div>
    </div>
    <div class="logo-block">
      <div class="logo">PHANTOM</div>
      <div class="logo-sub">forge heatmap — 6-month accelerator</div>
    </div>
    <div class="header-stats" id="header-stats"></div>
  </header>

  <div class="streak-row" id="streak-row"></div>

  <div class="controls">
    <span class="ctrl-label">Year</span>
    <div class="year-tabs" id="year-tabs"></div>
    <span class="ctrl-label" style="margin-left:1rem;">View</span>
    <div class="view-toggle">
      <button class="vtog" onclick="setView('weekly',this)">Weekly</button>
      <button class="vtog active" onclick="setView('log',this)">Log</button>
    </div>
    <div class="sync-row">
      <span class="sync-status"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">synced</span></span>
    </div>
    <div class="io-row">
      <button class="io-btn" onclick="exportData()">Export JSON</button>
      <button class="io-btn" onclick="document.getElementById('import-input').click()">Import JSON</button>
      <button class="io-btn" onclick="syncFromDaily()">Sync from daily/</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </div>

  
  <div id="view-weekly" style="display:none;">
    <div class="heatmap-section">
      <div class="section-title">Weekly completion</div>
      <div class="weekly-grid" id="weekly-grid"></div>
    </div>
  </div>

  <div id="view-log" style="display:none;">
    <div class="log-panel">
      <div class="log-header">
        <span class="log-title">Check-in log</span>
        <div class="log-filter">
          <button class="lf-btn active" onclick="filterLog('all',this)">All</button>
          <button class="lf-btn" onclick="filterLog('perfect',this)">Perfect</button>
          <button class="lf-btn" onclick="filterLog('fail',this)">Failed</button>
          <button class="lf-btn" onclick="filterLog('missed',this)">Missed</button>
        </div>
      </div>
      <div class="log-body" id="log-body"></div>
    </div>
  </div>

  <div class="add-section">
    <div class="section-title">Log check-in</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="entry-date">
      </div>
      <div class="form-group">
        <label class="form-label">Score <span id="score-disp" style="color:var(--accent)">7/10</span></label>
        <input type="range" class="score-slider form-input" id="entry-score" min="0" max="10" value="7"
          oninput="updateScorePreview(this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">Note (what shipped / what failed)</label>
        <input type="text" class="form-input" id="entry-note" placeholder="e.g. Vyrox IOC engine shipped, missed OSS block">
      </div>
      <div class="form-group">
        <label class="form-label">&nbsp;</label>
        <button class="add-btn" onclick="addEntry()">+ LOG</button>
      </div>
    </div>
  </div>

  <footer>
    <span class="footer-text">phantom-forge <span class="blink">█</span></span>
    <span class="footer-text" id="footer-date"></span>
  </footer>

</div>

<script>
const STORAGE_KEY = 'phantom_heatmap_v1';
const DATA_FILE = 'checkin-data.json';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { entries: [] };
  } catch { return { entries: [] }; }
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  syncToFile(data);
}

let data = loadData();

function entryMap() {
  const m = {};
  data.entries.forEach(e => m[e.date] = e);
  return m;
}

function scoreClass(score, isFuture) {
  if (isFuture) return 'future';
  if (score === null) return 'score-0';
  if (score === 0) return 'fail';
  if (score <= 1) return 'score-1';
  if (score <= 2) return 'score-2';
  if (score <= 4) return 'score-3';
  if (score <= 5) return 'score-4';
  if (score <= 6) return 'score-5';
  if (score <= 7) return 'score-6';
  if (score <= 8) return 'score-6';
  return 'score-7';
}

function scoreColor(score) {
  if (score === null) return '#111113';
  if (score === 0) return '#3d0f0f';
  const colors = ['#111113','#0f2318','#0e3d1f','#0d5c26','#0b7d2d','#09a034','#07c63b','#05ee42','#05ee42','#05ee42','#05ee42'];
  return colors[Math.min(score, 10)];
}

function badge(score, isFuture) {
  if (isFuture || score === null) return { cls:'badge-missed', label:'—' };
  if (score === 0) return { cls:'badge-missed', label:'MISSED' };
  if (score <= 3) return { cls:'badge-fail', label:'FAILED' };
  if (score <= 6) return { cls:'badge-ok', label:'OK' };
  if (score <= 8) return { cls:'badge-good', label:'GOOD' };
  return { cls:'badge-perfect', label:'PERFECT' };
}

function dateStr(d) {
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
}

function isoDate(d) { return d.toISOString().slice(0,10); }

function currentStreak(map) {
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = isoDate(d);
    const e = map[key];
    if (!e || e.score === 0) break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

function longestStreak(map) {
  const dates = Object.keys(map).sort();
  let max = 0, cur = 0, prev = null;
  dates.forEach(k => {
    const e = map[k];
    if (!e || e.score === 0) { cur = 0; prev = null; return; }
    if (!prev) { cur = 1; }
    else {
      const pd = new Date(prev), cd = new Date(k);
      const diff = (cd - pd) / 86400000;
      cur = diff === 1 ? cur + 1 : 1;
    }
    max = Math.max(max, cur);
    prev = k;
  });
  return max;
}

let currentYear = new Date().getFullYear();
let currentView = 'log';
let logFilter = 'all';

function render() {
  const map = entryMap();
  renderHeaderStats(map);
  renderStreakRow(map);
  renderWeekly(map);
  renderLog(map);
  document.getElementById('footer-date').textContent =
    'last updated: ' + new Date().toLocaleString();
}

function renderHeaderStats(map) {
  const entries = data.entries.filter(e => e.score > 0);
  const avg = entries.length ? (entries.reduce((s,e)=>s+e.score,0)/entries.length).toFixed(1) : '—';
  const total = data.entries.length;
  const missed = data.entries.filter(e => e.score === 0).length;
  const pct = total ? Math.round(((total-missed)/total)*100) : 0;
  const week = Math.ceil((new Date() - new Date('2026-05-22')) / (7*86400000)) + 1;
  const html = [
    { val: `${pct}%`, label: 'Completion', cls: pct>=80?'':'warn' },
    { val: avg, label: 'Avg score', cls: avg>=7?'':avg>=5?'warn':'danger' },
    { val: entries.length, label: 'Days logged', cls: '' },
    { val: `W${Math.max(1,Math.min(24,week))}`, label: 'Current week', cls: '' },
  ].map(s => `<div class="hstat">
    <span class="hstat-val ${s.cls}">${s.val}</span>
    <span class="hstat-label">${s.label}</span>
  </div>`).join('');
  document.getElementById('header-stats').innerHTML = html;
}

function renderStreakRow(map) {
  const cur = currentStreak(map);
  const best = longestStreak(map);
  const entries = data.entries.filter(e=>e.score>0);
  const perfect = data.entries.filter(e=>e.score>=9).length;
  const items = [
    { val: cur, label: 'Current streak', cls: cur>=7?'':cur>=3?'warn':'muted', suffix:'d' },
    { val: best, label: 'Best streak', cls: '', suffix:'d' },
    { val: perfect, label: 'Perfect days', cls: '', suffix:'' },
    { val: `${entries.length}/168`, label: '6-month progress', cls: '', suffix:'' },
  ];
  document.getElementById('streak-row').innerHTML = items.map(i=>`
    <div class="streak-card">
      <span class="sc-val ${i.cls}">${i.val}${i.suffix}</span>
      <span class="sc-label">${i.label}</span>
    </div>`).join('');
}

function renderYearTabs() {
  const years = [];
  const start = 2026;
  for (let y = start; y <= start+1; y++) years.push(y);
  document.getElementById('year-tabs').innerHTML = years.map(y =>
    `<button class="year-tab ${y===currentYear?'active':''}" onclick="setYear(${y},this)">${y}</button>`
  ).join('');
}

function renderHeatmap(map) {
  const today = new Date();
  const jan1 = new Date(currentYear, 0, 1);
  const dec31 = new Date(currentYear, 11, 31);

  const labelEl = document.getElementById('month-labels');
  labelEl.innerHTML = '';

  const dayEl = document.getElementById('day-labels');
  const dayNames = ['','Mon','','Wed','','Fri',''];
  dayEl.innerHTML = dayNames.map(d=>`<div class="day-label">${d}</div>`).join('');

  const grid = document.getElementById('heatmap-grid');
  grid.innerHTML = '';

  // Build weeks - each week is Sun-Sat column
  const weeks = [];
  const weekWidth = 13; // 11px cell + 2px gap

  // Find the first Sunday of or before Jan 1
  let cursor = new Date(jan1);
  const jan1Dow = cursor.getDay(); // 0=Sun
  cursor.setDate(cursor.getDate() - jan1Dow); // go back to preceding Sunday

  while (cursor <= dec31 || weeks.length === 0 || weeks[weeks.length-1].length > 0) {
    const week = [];
    for (let i = 0; i < 7; i++) {
      week.push(new Date(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    weeks.push(week);

    // Stop after we've passed Dec 31 and completed the week containing it
    const lastDay = week[6];
    if (lastDay >= dec31) break;
  }

  // Position month labels based on first occurrence of each month
  // Position each label at the exact cell where the month's first day appears
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  monthNames.forEach((name, mi) => {
    for (let wi = 0; wi < weeks.length; wi++) {
      for (let di = 0; di < 7; di++) {
        const day = weeks[wi][di];
        if (day.getMonth() === mi && day.getFullYear() === currentYear) {
          const el = document.createElement('span');
          el.className = 'month-label-item';
          el.textContent = name;
          el.style.left = (28 + wi * weekWidth + di * 13) + 'px';
          labelEl.appendChild(el);
          break;
        }
      }
    }
  });

  weeks.forEach(week => {
    const col = document.createElement('div');
    col.className = 'week-col';

    week.forEach((date, i) => {
      const cell = document.createElement('div');
      const key = isoDate(date);
      const isFuture = date > today;
      const isToday = key === isoDate(today);
      const isThisYear = date.getFullYear() === currentYear;
      const entry = isThisYear ? map[key] : null;
      const score = entry ? entry.score : (isThisYear && !isFuture ? null : null);

      cell.className = 'day-cell ' + (isThisYear ? scoreClass(score, isFuture) : 'future');
      if (isToday) cell.classList.add('today');

      cell.addEventListener('mouseenter', (e) => showTooltip(e, key, entry, isFuture, isThisYear, date));
      cell.addEventListener('mousemove', moveTooltip);
      cell.addEventListener('mouseleave', hideTooltip);
      cell.addEventListener('click', () => {
        if (!isFuture && isThisYear) openEntry(key, entry);
      });

      col.appendChild(cell);
    });
    grid.appendChild(col);
  });

  const legendCells = document.getElementById('legend-cells');
  legendCells.innerHTML = [0,1,2,3,4,5,6,7].map(i=>
    `<div class="legend-cell score-${i}"></div>`
  ).join('');
}

function renderWeekly(map) {
  const grid = document.getElementById('weekly-grid');
  const weeks = [];
  for (let w = 1; w <= 24; w++) {
    const startDay = new Date('2026-05-22');
    startDay.setDate(startDay.getDate() + (w-1)*7);
    const days = [];
    for (let d = 0; d < 7; d++) {
      const dd = new Date(startDay);
      dd.setDate(dd.getDate()+d);
      const key = isoDate(dd);
      days.push({ key, entry: map[key], date: dd });
    }
    const done = days.filter(d=>d.entry&&d.entry.score>0).length;
    const pct = Math.round((done/7)*100);
    const avgScore = done ? days.filter(d=>d.entry&&d.entry.score>0).reduce((s,d)=>s+d.entry.score,0)/done : 0;
    weeks.push({ w, days, done, pct, avgScore });
  }

  grid.innerHTML = weeks.map(wk => {
    const color = wk.pct >= 90 ? 'var(--accent)' : wk.pct >= 70 ? 'var(--warn)' : wk.pct > 0 ? 'var(--fail-text)' : 'var(--dim)';
    const pips = wk.days.map(d => {
      const c = d.entry && d.entry.score > 0 ? scoreColor(d.entry.score) : (d.date > new Date() ? 'var(--border)' : 'var(--fail)');
      return `<div class="wc-day-pip" style="background:${c}"></div>`;
    }).join('');
    return `<div class="week-card" style="--fill:${wk.pct/100}" onclick="jumpToWeek(${wk.w})">
      <div class="wc-header">
        <span class="wc-week">Week ${wk.w}</span>
        <span class="wc-pct" style="color:${color}">${wk.pct}%</span>
      </div>
      <div class="wc-bar-bg"><div class="wc-bar-fill" style="width:${wk.pct}%;background:${color}"></div></div>
      <div class="wc-days">${pips}</div>
      <div class="wc-label">${wk.done}/7 days · avg ${wk.avgScore.toFixed(1)}</div>
    </div>`;
  }).join('');
}

function renderLog(map) {
  const body = document.getElementById('log-body');
  let entries = [...data.entries].sort((a,b)=>b.date.localeCompare(a.date));

  if (logFilter === 'perfect') entries = entries.filter(e=>e.score>=9);
  else if (logFilter === 'fail') entries = entries.filter(e=>e.score<=3&&e.score>0);
  else if (logFilter === 'missed') entries = entries.filter(e=>e.score===0);

  if (entries.length === 0) {
    body.innerHTML = `<div style="padding:2rem;text-align:center;font-size:0.7rem;color:var(--muted);">No entries match this filter.</div>`;
    return;
  }

  body.innerHTML = entries.map(e => {
    const b = badge(e.score, false);
    const scoreColor = e.score===0 ? 'var(--fail-text)' : e.score<=3 ? 'var(--warn)' : 'var(--accent)';
    return `<div class="log-row">
      <span class="lr-date">${e.date}</span>
      <span class="lr-score" style="color:${scoreColor}">${e.score}/10</span>
      <span class="lr-note">${e.note || '—'}</span>
      <span class="lr-badge ${b.cls}">${b.label}</span>
    </div>`;
  }).join('');
}

function showTooltip(e, key, entry, isFuture, isThisYear, d) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-date').textContent = dateStr(d);

  if (isFuture || !isThisYear) {
    document.getElementById('tt-score').textContent = '—';
    document.getElementById('tt-score').className = 'tt-score';
    document.getElementById('tt-label').textContent = isFuture ? 'upcoming' : 'other year';
    document.getElementById('tt-bar-fill').style.width = '0%';
    document.getElementById('tt-tasks').textContent = '';
  } else if (!entry) {
    document.getElementById('tt-score').textContent = 'no check-in';
    document.getElementById('tt-score').className = 'tt-score warn';
    document.getElementById('tt-label').textContent = 'not logged';
    document.getElementById('tt-bar-fill').style.width = '0%';
    document.getElementById('tt-bar-fill').style.background = 'var(--dim)';
    document.getElementById('tt-tasks').textContent = '';
  } else {
    const s = entry.score;
    document.getElementById('tt-score').textContent = `${s}/10`;
    document.getElementById('tt-score').className = 'tt-score' + (s===0?' fail':s<=3?' warn':'');
    document.getElementById('tt-label').textContent = badge(s, false).label;
    document.getElementById('tt-bar-fill').style.width = `${s*10}%`;
    document.getElementById('tt-bar-fill').style.background = scoreColor(s);
    document.getElementById('tt-tasks').textContent = entry.note || '';
  }

  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + 180 > window.innerWidth) x = e.clientX - 180;
  if (y + 120 > window.innerHeight) y = e.clientY - 120;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function setYear(y, btn) {
  currentYear = y;
  document.querySelectorAll('.year-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const map = entryMap();
  renderHeatmap(map);
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.vtog').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-weekly').style.display = v==='weekly'?'':'none';
  document.getElementById('view-log').style.display = v==='log'?'':'none';
}

function filterLog(f, btn) {
  logFilter = f;
  document.querySelectorAll('.lf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLog(entryMap());
}

function jumpToWeek(w) {
  setView('log', document.querySelectorAll('.vtog')[2]);
}

function openEntry(key, entry) {
  document.getElementById('entry-date').value = key;
  if (entry) {
    document.getElementById('entry-score').value = entry.score;
    document.getElementById('entry-note').value = entry.note || '';
    updateScorePreview(entry.score);
  }
  document.getElementById('entry-date').scrollIntoView({ behavior:'smooth', block:'center' });
}

function updateScorePreview(v) {
  const labels = ['0 — MISSED','1 — dire','2 — poor','3 — rough','4 — below par',
    '5 — half done','6 — okay','7 — solid','8 — strong','9 — excellent','10 — PERFECT'];
  document.getElementById('score-disp').textContent = `${v}/10 — ${labels[v]}`;
  const colors = ['var(--fail-text)','var(--fail-text)','var(--fail-text)','var(--warn)',
    'var(--warn)','var(--warn)','var(--accent-dim)','var(--accent-dim)','var(--accent)','var(--accent)','var(--accent)'];
  document.getElementById('score-disp').style.color = colors[v];
}

function addEntry() {
  const date = document.getElementById('entry-date').value;
  const score = parseInt(document.getElementById('entry-score').value);
  const note = document.getElementById('entry-note').value.trim();

  if (!date) { alert('Pick a date first.'); return; }

  const idx = data.entries.findIndex(e => e.date === date);
  if (idx >= 0) data.entries[idx] = { date, score, note };
  else data.entries.push({ date, score, note });

  saveData(data);
  render();

  document.getElementById('entry-note').value = '';
  document.getElementById('entry-score').value = 7;
  updateScorePreview(7);
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `phantom-heatmap-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.entries && Array.isArray(imported.entries)) {
        const map = entryMap();
        imported.entries.forEach(entry => map[entry.date] = entry);
        data.entries = Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
        saveData(data);
        render();
      } else { alert('Invalid file format.'); }
    } catch { alert('Could not parse JSON.'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Sync to file (downloads JSON that can be committed to repo)
function syncToFile(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'checkin-data.json';
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('sync-dot').classList.remove('error');
  document.getElementById('sync-text').textContent = 'synced';
}

// Sync from daily/ folder - reads from file system via fetch
// Note: This requires the daily/ folder to have a JSON index
async function syncFromDaily() {
  document.getElementById('sync-dot').classList.add('error');
  document.getElementById('sync-text').textContent = 'syncing...';

  // Check if there's a local data file we can fetch
  try {
    const response = await fetch('checkin-data.json');
    if (response.ok) {
      const imported = await response.json();
      if (imported.entries && Array.isArray(imported.entries)) {
        const map = entryMap();
        imported.entries.forEach(entry => map[entry.date] = entry);
        data.entries = Object.values(map).sort((a,b)=>a.date.localeCompare(b.date));
        saveData(data);
        render();
        document.getElementById('sync-dot').classList.remove('error');
        document.getElementById('sync-text').textContent = 'synced';
        return;
      }
    }
  } catch {}

  // If no file found, show instructions
  alert('To sync from daily/ folder:\n\n1. Run checkin in Claude Code\n2. Export JSON from this heatmap\n3. Commit checkin-data.json to repo\n4. Click "Sync from daily/" to import');
  document.getElementById('sync-text').textContent = 'manual';
}

document.getElementById('entry-date').value = isoDate(new Date());
updateScorePreview(7);
render();
</script>
</body>
</html>
